name: OncoViz
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip

  # Core
  - numpy>=1.24
  - pandas>=2.0
  - streamlit>=1.30

  # Visualization
  - plotly>=5.18

  # Statistics
  - scipy>=1.11
  - statsmodels>=0.14

  # Data handling
  - xlrd>=2.0

  # Testing
  - pytest>=7.4
  - pytest-cov>=4.1

  # Pip-only packages
  - pip:
      - lifelines>=0.27.0
      - kaleido>=0.2.1
